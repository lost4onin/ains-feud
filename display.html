<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AINS Feud Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="screen screen-display" aria-label="AINS Feud participant display">
    <header class="topbar">
      <div class="logo-shell">
        <img src="ains-logo-cropped.png" alt="Artificial Intelligence National Summit Fourth Edition" />
      </div>
      <div class="event-label">AINS Feud</div>
    </header>

    <section class="display-stage">
      <div class="strike-bank" id="strikeBank" aria-label="Strikes"></div>
      <div class="display-scoreboard" aria-label="Scores">
        <div class="display-score">
          <span>Team 1</span>
          <strong id="displayTeamOne">0</strong>
        </div>
        <div class="display-score round">
          <span>Round's Bank</span>
          <strong id="displayRoundScore">0</strong>
        </div>
        <div class="display-score">
          <span>Team 2</span>
          <strong id="displayTeamTwo">0</strong>
        </div>
      </div>
      <div class="question-card">
        <h1 id="questionDisplay"></h1>
      </div>

      <div class="marquee">
        <div class="answer-grid" id="answerGrid"></div>
      </div>

      <div class="strike-flash" id="strikeFlash" aria-hidden="true">
        <span>X</span>
      </div>
    </section>
  </main>

  <script src="feud-state.js"></script>
  <script src="feud-audio.js"></script>
  <script>
    const questionDisplay = document.querySelector("#questionDisplay");
    const answerGrid = document.querySelector("#answerGrid");
    const strikeBank = document.querySelector("#strikeBank");
    const strikeFlash = document.querySelector("#strikeFlash");
    const displayTeamOne = document.querySelector("#displayTeamOne");
    const displayTeamTwo = document.querySelector("#displayTeamTwo");
    const displayRoundScore = document.querySelector("#displayRoundScore");
    const displayEventLabel = document.querySelector(".event-label");
    const initialState = AINSFeud.getState();
    let lastPulse = initialState.strikePulse;
    let previousRevealed = initialState.answers.map((answer) => Boolean(answer.revealed));
    let previousScores = {
      roundScore: Number(initialState.roundScore) || 0,
      teamScores: initialState.teamScores.map((score) => Number(score) || 0)
    };

    AINSFeudAudio.bindUnlock(document);

    function renderAnswers(state) {
      answerGrid.innerHTML = "";

      AINSFeud.answerOrder.forEach((answerIndex) => {
        const answer = state.answers[answerIndex];
        const tile = document.createElement("div");
        tile.className = `answer-tile${answer.revealed ? " is-revealed" : ""}`;

        const answerFace = document.createElement("div");
        answerFace.className = "answer-face";

        const number = document.createElement("span");
        number.className = "answer-number";
        number.textContent = answerIndex + 1;

        const text = document.createElement("span");
        text.className = "answer-text";
        text.textContent = answer.text || "Answer";

        const pointsFace = document.createElement("div");
        pointsFace.className = "points-face";

        const points = document.createElement("span");
        points.className = "answer-points";
        points.textContent = answer.points || 0;

        answerFace.append(number, text);
        pointsFace.append(points);
        tile.append(answerFace, pointsFace);
        answerGrid.append(tile);
      });
    }

    function renderStrikes(state) {
      strikeBank.innerHTML = "";

      for (let index = 1; index <= 3; index += 1) {
        const mark = document.createElement("span");
        mark.className = `strike-mark${state.strikes >= index ? " is-active" : ""}`;
        mark.textContent = "X";
        strikeBank.append(mark);

      }

      if (state.strikePulse !== lastPulse) {
        lastPulse = state.strikePulse;

        strikeFlash.innerHTML = "";
        const flashCount = state.strikes >= 4 ? 1 : Math.max(1, state.strikes);
        for (let i = 0; i < flashCount; i++) {
          const span = document.createElement("span");
          span.textContent = "X";
          strikeFlash.appendChild(span);
        }

        strikeFlash.classList.remove("is-live");
        void strikeFlash.offsetWidth;
        strikeFlash.classList.add("is-live");
        setTimeout(() => AINSFeudAudio.play("buzzer"), 10);

      }
    }

    function renderMultiplier(state) {
      const mult = Math.max(1, Math.min(3, Number(state.multiplier) || 1));

      displayEventLabel.textContent = mult > 1 ? `AINS Feud X${mult}` : "AINS Feud";
      displayEventLabel.classList.toggle("is-multiplier", mult > 1);
    }

    function playStateSounds(state, strikeChanged) {
      const newlyRevealed = state.answers.some((answer, index) => (
        Boolean(answer.revealed) && !previousRevealed[index]
      ));
      const scoreGained = Number(state.roundScore) > previousScores.roundScore
        || state.teamScores.some((score, index) => Number(score) > previousScores.teamScores[index]);

      if (newlyRevealed) {
        AINSFeudAudio.play("reveal");
      }

      if (scoreGained) {
        const delay = strikeChanged ? 820 : newlyRevealed ? 170 : 0;
        setTimeout(() => AINSFeudAudio.play("score"), delay);
      }

      previousRevealed = state.answers.map((answer) => Boolean(answer.revealed));
      previousScores = {
        roundScore: Number(state.roundScore) || 0,
        teamScores: state.teamScores.map((score) => Number(score) || 0)
      };
    }

    AINSFeud.subscribe((state) => {
      const strikeChanged = state.strikePulse !== lastPulse;

      questionDisplay.textContent = state.question || "Question";
      displayTeamOne.textContent = state.teamScores[0];
      displayTeamTwo.textContent = state.teamScores[1];
      displayRoundScore.textContent = state.roundScore;
      renderMultiplier(state);
      renderAnswers(state);
      renderStrikes(state);
      playStateSounds(state, strikeChanged);
    });
  </script>
</body>
</html>
